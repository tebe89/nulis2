<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v15 EVOLUTION - Serial Writer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { background-color: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .novel-editor { font-family: 'Crimson Pro', serif; font-size: 1.25rem; line-height: 1.8; background: #0a0a0a; border: 1px solid #1a1a1a; color: #e5e5e5; padding: 40px; border-radius: 20px; width: 100%; outline: none; min-height: 60vh; }
        .sidebar-item { transition: 0.3s; cursor: pointer; border-left: 3px solid transparent; }
        .sidebar-item.active { background: #111; border-left-color: #3b82f6; color: white; }
        .input-dark { background: #111; border: 1px solid #222; color: white; border-radius: 10px; padding: 10px; outline: none; width: 100%; }
        .btn-blue { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; font-weight: 900; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-72 bg-[#080808] border-r border-gray-900 flex flex-col">
        <div class="p-6 border-b border-gray-900">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 uppercase italic">v15 EVOLUTION</h1>
        </div>
        
        <div class="p-4 space-y-4 border-b border-gray-900">
            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-600 uppercase">Judul Utama Novel</label>
                <input type="text" id="mainNovelTitle" placeholder="Nama Mahakarya..." class="input-dark text-xs font-bold" oninput="saveAll()">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-600 uppercase">Engine Access</label>
                <input type="password" id="apiKey" placeholder="Gemini API Key..." class="text-[10px] input-dark">
                <button onclick="checkAPI()" id="apiStatus" class="w-full py-2 bg-gray-900 text-[9px] font-black rounded-lg uppercase border border-gray-800">Cek Engine</button>
            </div>
        </div>

        <div id="chapterList" class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1">
            </div>

        <div class="p-4 border-t border-gray-900 space-y-2">
            <button onclick="exportAll('txt')" class="w-full py-2 bg-gray-800 text-[10px] font-bold rounded-lg uppercase">Ekspor TXT</button>
            <button onclick="exportAll('html')" class="w-full py-2 border border-blue-900 text-blue-500 text-[10px] font-bold rounded-lg uppercase">Ekspor HTML</button>
            <button onclick="resetApp()" class="w-full py-1 text-[8px] text-red-900 font-bold uppercase mt-2">Hapus Draf</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-screen relative">
        <header class="h-16 border-b border-gray-900 flex items-center justify-between px-10 bg-black/50 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <span id="currentChapterLabel" class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Prolog</span>
                <input type="text" id="currentChapterTitle" placeholder="Judul Bab Ini..." class="bg-transparent border-none text-white font-bold text-lg outline-none w-64" oninput="updateChapterData()">
            </div>
            <div class="flex gap-4">
                <button onclick="writeChapter()" id="writeBtn" class="px-8 py-2 btn-blue rounded-full text-xs shadow-lg shadow-blue-900/20 uppercase tracking-widest">TULIS NARASI</button>
                <button onclick="addNewChapter()" class="px-6 py-2 bg-white text-black font-black rounded-full text-[10px] uppercase hover:bg-blue-500 transition">Bab Baru +</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10 custom-scroll bg-[#050505]">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase">Konsep Dunia & Sistem</label>
                        <textarea id="globalIdea" rows="2" class="text-xs input-dark" placeholder="Garis besar cerita, aturan sistem, dll..." oninput="saveAll()"></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-black text-gray-600 uppercase">Tujuan / Instruksi Bab Ini</label>
                        <textarea id="chapterInstruction" rows="2" class="text-xs input-dark" placeholder="Apa yang terjadi di bab ini?" oninput="updateChapterData()"></textarea>
                    </div>
                </div>

                <textarea id="mainContent" class="novel-editor" placeholder="Narasi bab..." oninput="updateChapterData()"></textarea>
                
                <div class="bg-[#0a0a0a] border border-gray-900 p-4 rounded-xl">
                    <label class="text-[9px] font-black text-blue-500 uppercase italic">Memory Bridge (Logika Cerita)</label>
                    <div id="memoryBridge" class="text-[11px] text-gray-500 italic mt-1">Belum ada memori.</div>
                </div>
            </div>
        </main>

        <div id="loader" class="hidden absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loaderMsg" class="text-[10px] font-black tracking-widest text-blue-500 uppercase">Engine Sedang Menulis...</p>
        </div>
    </div>

    <script>
        // PROLOG DEFAULT INSTRUCTION
        const PROLOG_DEFAULT = "Perkenalkan karakter utama secara mendalam, jelaskan latar belakang dunianya, aturan sistem yang ia miliki, dan bagaimana konflik pertama kali muncul. Fokus pada detail sensorik dan suasana.";
        
        let chapters = [{ 
            label: "Prolog", 
            title: "", 
            content: "", 
            bridge: "", 
            instruction: PROLOG_DEFAULT 
        }];
        let activeIdx = 0;

        const getEl = id => document.getElementById(id);

        async function writeChapter() {
            const key = getEl('apiKey').value;
            if(!key) return alert("Isi API Key!");

            getEl('loader').classList.remove('hidden');
            getEl('loaderMsg').innerText = "Menyusun Narasi Panjang...";

            let prevContext = "";
            if (activeIdx > 0) {
                const prev = chapters[activeIdx - 1];
                prevContext = `SAMBUNGAN LANGSUNG DARI BAB SEBELUMNYA:
                - Akhir Teks: "...${prev.content.slice(-1200)}"
                - Status Logika: ${prev.bridge}\n`;
            }

            const prompt = `PENULIS NOVEL PROFESIONAL.
            JUDUL NOVEL: ${getEl('mainNovelTitle').value}
            DUNIA & SISTEM: ${getEl('globalIdea').value}
            GAYA: Sastra, Deskriptif, Clean (Tanpa basa-basi).
            
            ${prevContext}
            INSTRUKSI BAB INI: ${getEl('chapterInstruction').value}
            
            ATURAN KETAT:
            1. Tulis narasi LANGSUNG. Jangan menyapa user.
            2. Minimal 1500 kata. Ekspansi adegan sedetail mungkin.
            3. Jika ini Prolog, fokus pada pondasi karakter dan dunia.
            4. Jika ini Bab Lanjutan, pastikan alur menyambung sempurna tanpa pengulangan intro.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text.trim();
                
                getEl('mainContent').value = text;
                chapters[activeIdx].content = text;

                // Auto Bridge
                getEl('loaderMsg').innerText = "Meringkas Logika Bab...";
                const bRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analisis teks bab ini dan catat poin penting (lokasi, barang, status tokoh) untuk bab selanjutnya: ${text.substring(0, 3000)}` }] }] })
                });
                const bd = await bRes.json();
                const bridge = bd.candidates[0].content.parts[0].text.trim();
                
                chapters[activeIdx].bridge = bridge;
                getEl('memoryBridge').innerText = bridge;

                saveAll();
                renderChapterList();
            } catch (e) { alert("Error!"); }
            finally { getEl('loader').classList.add('hidden'); }
        }

        function addNewChapter() {
            const num = chapters.length;
            chapters.push({ label: `Bab ${num}`, title: "", content: "", bridge: "", instruction: "" });
            switchChapter(num);
        }

        function switchChapter(idx) {
            activeIdx = idx;
            const ch = chapters[idx];
            getEl('currentChapterLabel').innerText = ch.label;
            getEl('currentChapterTitle').value = ch.title;
            getEl('chapterInstruction').value = ch.instruction;
            getEl('mainContent').value = ch.content;
            getEl('memoryBridge').innerText = ch.bridge || "Belum ada memori.";
            renderChapterList();
        }

        function updateChapterData() {
            chapters[activeIdx].title = getEl('currentChapterTitle').value;
            chapters[activeIdx].content = getEl('mainContent').value;
            chapters[activeIdx].instruction = getEl('chapterInstruction').value;
            saveAll();
            renderChapterList();
        }

        function renderChapterList() {
            const container = getEl('chapterList');
            container.innerHTML = "";
            chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = `sidebar-item p-3 text-[10px] font-bold rounded-lg ${i === activeIdx ? 'active' : 'text-gray-500'}`;
                div.innerHTML = `<div>${ch.label}</div><div class="text-[8px] opacity-50 truncate">${ch.title || '(Tanpa Judul)'}</div>`;
                div.onclick = () => switchChapter(i);
                container.appendChild(div);
            });
        }

        function saveAll() {
            const data = { 
                mainTitle: getEl('mainNovelTitle').value,
                idea: getEl('globalIdea').value, 
                chapters: chapters, 
                key: getEl('apiKey').value 
            };
            localStorage.setItem('tebe_v15_evolution_pro', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = localStorage.getItem('tebe_v15_evolution_pro');
            if(saved) {
                const d = JSON.parse(saved);
                getEl('mainNovelTitle').value = d.mainTitle || "";
                getEl('globalIdea').value = d.idea || "";
                getEl('apiKey').value = d.key || "";
                chapters = d.chapters;
                switchChapter(activeIdx);
            } else { renderChapterList(); }
        }

        function exportAll(format) {
            const mainTitle = getEl('mainNovelTitle').value || "Novel";
            let out = "";
            if(format === 'html') {
                out = `<html><body style="font-family:serif; padding:50px; background:#f4ece0; line-height:1.8;">`;
                out += `<h1 style="text-align:center; font-size:3rem;">${mainTitle}</h1><hr>`;
                chapters.forEach(ch => {
                    out += `<h2 style="text-align:center;">${ch.label}: ${ch.title}</h2><p style="white-space:pre-wrap;">${ch.content}</p><hr>`;
                });
                out += `</body></html>`;
            } else {
                out = `JUDUL UTAMA: ${mainTitle}\n\n`;
                chapters.forEach(ch => {
                    out += `\n\n--- ${ch.label}: ${ch.title} ---\n\n${ch.content}`;
                });
            }
            const blob = new Blob([out], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${mainTitle}.${format}`; a.click();
        }

        function resetApp() { if(confirm("Hapus seluruh draf?")) { localStorage.clear(); location.reload(); } }
        async function checkAPI() { 
            const key = getEl('apiKey').value;
            if(!key) return alert("Key Kosong");
            getEl('apiStatus').innerText = "Koneksi...";
            try { 
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                if(res.ok) { getEl('apiStatus').innerText = "ONLINE"; getEl('apiStatus').style.color = "#3b82f6"; }
            } catch(e) { alert("Gagal"); }
        }
    </script>
</body>
</html>
