<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v15 STREAM - Linear Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&display=swap');
        
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; position: fixed; width: 100%; }
        .master-layout { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 75px 1fr; height: 100vh; }

        /* TOP NAV */
        .top-nav { grid-column: 1 / -1; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 100; }

        /* SIDEBAR */
        .sidebar { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }
        .chapter-nav { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }

        /* EDITOR */
        .main-editor { background: #050505; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }
        .novel-paper { font-family: 'Crimson Pro', serif; font-size: 1.35rem; line-height: 1.9; background: #0a0a0a; border: 1px solid #1a1a1a; color: #e5e5e5; padding: 35px; border-radius: 20px; width: 100%; outline: none; min-height: 700px; resize: none; }

        /* UI */
        .sidebar-item { padding: 14px; margin-bottom: 6px; border-radius: 12px; cursor: pointer; border-left: 4px solid transparent; font-size: 11px; background: #0c0c0c; transition: 0.2s; }
        .sidebar-item.active { background: #111; border-left-color: #3b82f6; color: white; font-weight: bold; }
        .input-dark { background: #111; border: 1px solid #222; color: white; border-radius: 10px; padding: 8px 12px; outline: none; font-size: 11px; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; font-weight: 800; border-radius: 30px; }

        .loader { width: 30px; height: 30px; border: 4px solid #111; border-bottom-color: #3b82f6; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="master-layout">
        <header class="top-nav">
            <h1 class="text-blue-600 font-black italic text-lg tracking-tighter flex-shrink-0 uppercase">v15 STREAM</h1>
            <input type="text" id="mainNovelTitle" placeholder="Judul Novel..." class="input-dark w-40 font-bold" oninput="saveAll()">
            <input type="password" id="apiKey" placeholder="API Key..." class="input-dark w-40">
            <button onclick="fetchModels()" id="btnFetch" class="text-[9px] font-black text-gray-500 uppercase">Hubungkan</button>
            <select id="modelSelect" class="input-dark hidden text-blue-400 font-bold"></select>
            <div class="flex-1"></div>
            <button onclick="exportAll('txt')" class="px-4 py-2 bg-gray-900 text-[10px] font-black rounded-lg border border-gray-800 uppercase">TXT</button>
            <button onclick="exportAll('html')" class="px-4 py-2 border border-blue-900 text-blue-500 text-[10px] font-black rounded-lg uppercase ml-1">HTML</button>
        </header>

        <aside class="sidebar">
            <div class="p-4 border-b border-gray-900 flex justify-between items-center text-[10px] font-black uppercase text-gray-600 tracking-widest">Alur Cerita</div>
            <div id="chapterNav" class="chapter-nav"></div>
            <div class="p-4 border-t border-gray-900 bg-black/40">
                <button onclick="resetApp()" class="w-full py-2 text-[8px] text-red-900 font-black uppercase opacity-40">Reset Semua Draf</button>
            </div>
        </aside>

        <main class="main-editor">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="flex items-center justify-between bg-[#0a0a0a] p-5 rounded-3xl border border-gray-900">
                    <div class="flex flex-col flex-1">
                        <span id="currentLabel" class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Prolog</span>
                        <input type="text" id="currentTitle" placeholder="Judul Bab..." class="bg-transparent border-none text-white font-bold text-2xl outline-none w-full" oninput="updateChapterData()">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="generateCurrentChapter()" id="writeBtn" class="px-8 py-2.5 btn-primary text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">Buat Narasi</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Dunia & Sistem</label>
                        <textarea id="globalIdea" rows="3" class="input-dark w-full" placeholder="Aturan dunia, kultivasi, dll..." oninput="saveAll()"></textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Rencana Alur Bab Ini</label>
                        <textarea id="chapterInstruction" rows="3" class="input-dark w-full border-blue-900/20" placeholder="Apa yang terjadi di bab ini?" oninput="updateChapterData()"></textarea>
                    </div>
                </div>

                <textarea id="mainContent" class="novel-paper" placeholder="Klik 'Buat Narasi' untuk mengisi halaman ini..." oninput="updateChapterData()"></textarea>

                <div class="flex items-center justify-between pt-6 border-t border-gray-900">
                    <button onclick="rebuildChapter()" class="text-[9px] font-black text-gray-500 uppercase tracking-widest border border-gray-800 px-6 py-2 rounded-full hover:bg-gray-900">Buat Ulang (Revisi)</button>
                    <div class="flex gap-4">
                        <button onclick="finishStory()" class="text-[9px] font-black text-red-700 uppercase tracking-widest px-6 py-2">Akhiri Epilog</button>
                        <button onclick="prepareNextChapter()" id="nextBtn" class="px-8 py-2 bg-blue-600 text-white font-black rounded-full text-[10px] uppercase tracking-widest">Siapkan Bab Berikutnya →</button>
                    </div>
                </div>

                <div style="height: 100px;"></div>
            </div>
        </main>

        <div id="loader" class="hidden fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center text-center">
            <div class="loader mb-6"></div>
            <p id="loaderMsg" class="text-[10px] font-black tracking-[0.5em] text-blue-600 uppercase">Menyusun Takdir...</p>
        </div>
    </div>

    <script>
        const PROLOG_INSTR = "Mulai perkenalkan karakter utama, dunia, dan konflik awal secara mendalam.";
        let chapters = [{ label: "Prolog", title: "Awal Segalanya", content: "", instruction: PROLOG_INSTR }];
        let activeIdx = 0;
        const getEl = id => document.getElementById(id);

        async function fetchModels() {
            const key = getEl('apiKey').value;
            if(!key) return alert("Input API Key!");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if(data.models) {
                    const sel = getEl('modelSelect');
                    const filtered = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));
                    sel.innerHTML = filtered.map(m => `<option value="${m.name}">${m.displayName.replace("Gemini ","")}</option>`).join('');
                    sel.classList.remove('hidden');
                    getEl('btnFetch').classList.add('hidden');
                }
            } catch (e) { alert("Gagal koneksi."); }
        }

        async function callAI(prompt, msg) {
            const key = getEl('apiKey').value;
            const model = getEl('modelSelect').value;
            if(!key || !model) { alert("Key & Model belum siap!"); return null; }
            getEl('loader').classList.remove('hidden');
            getEl('loaderMsg').innerText = msg;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                return d.candidates[0].content.parts[0].text.trim();
            } catch (e) { alert("Error API."); return null; }
            finally { getEl('loader').classList.add('hidden'); }
        }

        async function generateCurrentChapter() {
            const idea = getEl('globalIdea').value;
            const instr = getEl('chapterInstruction').value;
            if(!idea || !instr) return alert("Isi Konsep Dunia & Alur Bab!");
            
            let prevText = "";
            if (activeIdx > 0) {
                prevText = `SAMBUNGAN: "...${chapters[activeIdx-1].content.slice(-1500)}"\n`;
            }

            const prompt = `PENULIS NOVEL. JUDUL: ${getEl('mainNovelTitle').value}\nDUNIA: ${idea}\n${prevText}BAB INI (${getEl('currentLabel').innerText}): ${instr}\nATURAN: Tulis narasi naskah langsung (min 1500 kata). Deskriptif & Deep.`;
            
            const text = await callAI(prompt, "MENULIS NARASI...");
            if(text) {
                chapters[activeIdx].content = text;
                getEl('mainContent').value = text;
                saveAll();
            }
        }

        async function prepareNextChapter() {
            if(!chapters[activeIdx].content) return alert("Buat dulu narasi bab ini!");
            
            const prompt = `Berdasarkan narasi bab ini: "${chapters[activeIdx].content.slice(-1500)}". Berikan satu rencana alur singkat yang paling logis untuk bab selanjutnya. Langsung tulis alurnya saja tanpa pembuka.`;
            const nextInstr = await callAI(prompt, "MERANCANG ALUR BERIKUTNYA...");
            
            if(nextInstr) {
                const newIdx = chapters.length;
                chapters.push({ label: `Bab ${newIdx}`, title: `Bab ${newIdx}`, content: "", instruction: nextInstr });
                switchChapter(newIdx);
            }
        }

        function rebuildChapter() {
            if(confirm("Buat ulang narasi bab ini? Teks lama akan hilang.")) {
                generateCurrentChapter();
            }
        }

        async function finishStory() {
            const prompt = `Buat alur epilog penutup untuk novel ini berdasarkan kejadian terakhir.`;
            const instr = await callAI(prompt, "MERANCANG PENUTUP...");
            if(instr) {
                chapters.push({ label: "Epilog", title: "Akhir Cerita", content: "", instruction: instr });
                switchChapter(chapters.length - 1);
            }
        }

        function switchChapter(idx) {
            activeIdx = idx;
            const ch = chapters[idx];
            getEl('currentLabel').innerText = ch.label;
            getEl('currentTitle').value = ch.title;
            getEl('chapterInstruction').value = ch.instruction;
            getEl('mainContent').value = ch.content;
            renderNav();
            saveAll();
        }

        function renderNav() {
            const nav = getEl('chapterNav');
            nav.innerHTML = "";
            chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = `sidebar-item shadow-sm ${i === activeIdx ? 'active' : ''}`;
                div.innerHTML = `<b>${ch.label}</b><br><span class="opacity-50 truncate block">${ch.title}</span>`;
                div.onclick = () => switchChapter(i);
                nav.appendChild(div);
            });
            const sp = document.createElement('div'); sp.style.height = "100px"; nav.appendChild(sp);
        }

        function updateChapterData() {
            chapters[activeIdx].title = getEl('currentTitle').value;
            chapters[activeIdx].content = getEl('mainContent').value;
            chapters[activeIdx].instruction = getEl('chapterInstruction').value;
            saveAll();
        }

        function saveAll() {
            const data = { title: getEl('mainNovelTitle').value, idea: getEl('globalIdea').value, chapters, key: getEl('apiKey').value, model: getEl('modelSelect').value };
            localStorage.setItem('v15_stream_linear_v1', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = localStorage.getItem('v15_stream_linear_v1');
            if(saved) {
                const d = JSON.parse(saved);
                getEl('mainNovelTitle').value = d.title || "";
                getEl('globalIdea').value = d.idea || "";
                getEl('apiKey').value = d.key || "";
                if(d.key) fetchModels().then(() => { getEl('modelSelect').value = d.model; });
                chapters = d.chapters;
                switchChapter(activeIdx);
            } else { renderNav(); }
        }

        function exportAll(format) {
            const mainTitle = getEl('mainNovelTitle').value || "Novel";
            let out = "";
            if(format === 'html') {
                out = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{background:#f4ece0;padding:50px;font-family:serif;line-height:1.8;color:#1a1a1a;}.container{max-width:800px;margin:auto;background:white;padding:60px;box-shadow:0 0 10px rgba(0,0,0,0.05);border-radius:8px;}h1,h2{text-align:center;}p{text-indent:3rem;margin-bottom:1.5rem;text-align:justify;}</style></head><body><div class="container"><h1>${mainTitle}</h1>`;
                chapters.forEach(ch => { out += `<h2>${ch.label}: ${ch.title}</h2>${ch.content.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('')}<hr>`; });
                out += `</div></body></html>`;
            } else {
                chapters.forEach(ch => { out += `\n\n--- ${ch.label}: ${ch.title} ---\n\n${ch.content}`; });
            }
            const blob = new Blob([out], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${mainTitle}.${format}`; a.click();
        }

        function resetApp() { if(confirm("Hapus draf?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
