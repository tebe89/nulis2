<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v15 EVOLUTION - Fixed Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; }
        body { background-color: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        .app-container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; width: 100vw; }

        /* SIDEBAR FIXED LAYOUT */
        .sidebar { 
            display: grid;
            grid-template-rows: auto auto 1fr auto; /* Area Navigasi (1fr) akan dipaksa scroll */
            background: #080808; 
            border-right: 1px solid #1a1a1a;
            height: 100vh;
        }

        .chapter-nav-scroll {
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
        }

        /* EDITOR AREA */
        .main-editor { 
            display: grid;
            grid-template-rows: 64px 1fr;
            height: 100vh;
            background: #050505;
        }

        .content-scroll {
            overflow-y: auto;
            padding: 40px;
        }

        /* Elements */
        .novel-editor { 
            font-family: 'Crimson Pro', serif; font-size: 1.35rem; line-height: 1.9; background: #0a0a0a; border: 1px solid #1a1a1a; 
            color: #e5e5e5; padding: 40px; border-radius: 24px; width: 100%; outline: none; min-height: 900px; resize: none;
        }

        .sidebar-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; margin-bottom: 8px; border-radius: 12px; padding: 12px; }
        .sidebar-item.active { background: #111; border-left-color: #3b82f6; color: white; }

        /* Custom Scrollbar - Tebal agar terlihat */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .input-dark { background: #111; border: 1px solid #222; color: white; border-radius: 10px; padding: 10px; outline: none; width: 100%; }
        .btn-blue { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; font-weight: 900; }
        
        .loader { width: 40px; height: 40px; border: 4px solid #111; border-bottom-color: #3b82f6; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="p-6 border-b border-gray-900">
                <h1 class="text-xl font-black text-blue-500 italic uppercase">v15 EVOLUTION</h1>
            </div>
            
            <div class="p-4 space-y-4 border-b border-gray-900">
                <input type="text" id="mainNovelTitle" placeholder="Judul Utama Novel..." class="input-dark text-xs font-bold" oninput="saveAll()">
                <input type="password" id="apiKey" placeholder="Gemini API Key..." class="text-[10px] input-dark">
                <button onclick="checkAPI()" id="apiStatus" class="w-full py-2 bg-gray-900 text-[9px] font-black rounded-lg uppercase border border-gray-800 transition">Cek Engine</button>
            </div>

            <div id="chapterList" class="chapter-nav-scroll">
                </div>

            <div class="p-4 border-t border-gray-900 bg-[#080808] space-y-2">
                <button onclick="exportAll('txt')" class="w-full py-2 bg-gray-800 text-[10px] font-black rounded-lg uppercase">EKSPOR TXT</button>
                <button onclick="exportAll('html')" class="w-full py-2 border border-blue-900 text-blue-500 text-[10px] font-black rounded-lg uppercase">EKSPOR HTML</button>
                <button onclick="resetApp()" class="w-full py-1 text-[8px] text-red-900 font-bold uppercase mt-1 opacity-40">Hapus Draf</button>
            </div>
        </aside>

        <main class="main-editor">
            <header class="border-b border-gray-900 flex items-center justify-between px-10 bg-black/50 backdrop-blur-md">
                <div class="flex items-center gap-6">
                    <span id="currentChapterLabel" class="text-[10px] font-black text-blue-500 uppercase tracking-widest italic">Prolog</span>
                    <input type="text" id="currentChapterTitle" placeholder="Judul Bab..." class="bg-transparent border-none text-white font-black text-xl outline-none w-80" oninput="updateChapterData()">
                </div>
                <div class="flex gap-4">
                    <button onclick="writeChapter()" class="px-10 py-2 btn-blue rounded-full text-xs shadow-lg uppercase tracking-widest">TULIS NARASI</button>
                    <button onclick="addNewChapter()" class="px-6 py-2 bg-white text-black font-black rounded-full text-[10px] uppercase hover:bg-blue-500 transition">Bab Baru +</button>
                </div>
            </header>

            <div class="content-scroll">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 uppercase">Konsep Dunia & Sistem</label>
                            <textarea id="globalIdea" rows="3" class="text-xs input-dark" oninput="saveAll()"></textarea>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-blue-500 uppercase italic">Tujuan Bab (Instruksi)</label>
                            <textarea id="chapterInstruction" rows="3" class="text-xs input-dark" oninput="updateChapterData()"></textarea>
                        </div>
                    </div>

                    <textarea id="mainContent" class="novel-editor" oninput="updateChapterData()"></textarea>
                    
                    <div class="bg-[#0a0a0a] border border-gray-900 p-8 rounded-3xl mb-10">
                        <label class="text-[10px] font-black text-blue-500 uppercase italic mb-3 block">Memory Bridge</label>
                        <div id="memoryBridge" class="text-xs text-gray-500 italic">Belum ada memori.</div>
                    </div>
                    <div style="height: 100px;"></div>
                </div>
            </div>
        </main>

        <div id="loader" class="hidden fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center text-center">
            <div class="loader mb-6"></div>
            <p class="text-[10px] font-black tracking-widest text-blue-500 uppercase">Engine Sedang Menulis...<br>Tetap di halaman ini.</p>
        </div>
    </div>

    <script>
        const PROLOG_DEFAULT = "Perkenalkan karakter utama secara mendalam, jelaskan latar belakang dunianya, aturan sistem kekuatan yang ia miliki, dan bagaimana konflik pertama kali muncul.";
        let chapters = [{ label: "Prolog", title: "", content: "", bridge: "", instruction: PROLOG_DEFAULT }];
        let activeIdx = 0;
        const getEl = id => document.getElementById(id);

        async function writeChapter() {
            const key = getEl('apiKey').value;
            if(!key) return alert("API Key Kosong!");
            getEl('loader').classList.remove('hidden');

            let prevContext = "";
            if (activeIdx > 0) {
                const prev = chapters[activeIdx - 1];
                prevContext = `SAMBUNGAN BAB SEBELUMNYA: "...${prev.content.slice(-1500)}"\nMemori: ${prev.bridge}\n`;
            }

            const prompt = `PENULIS NOVEL PROFESIONAL. JUDUL: ${getEl('mainNovelTitle').value}\nDUNIA: ${getEl('globalIdea').value}\n${prevContext}INSTRUKSI BAB: ${getEl('chapterInstruction').value}\nATURAN: Tulis narasi langsung (min 1500 kata). GAYA: Sastra Deskriptif.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text.trim();
                getEl('mainContent').value = text;
                chapters[activeIdx].content = text;

                const bRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analisis status tokoh/lokasi bab ini: ${text.substring(0, 2500)}` }] }] })
                });
                const bd = await bRes.json();
                chapters[activeIdx].bridge = bd.candidates[0].content.parts[0].text.trim();
                getEl('memoryBridge').innerText = chapters[activeIdx].bridge;

                saveAll();
                renderChapterList();
            } catch (e) { alert("Error API."); }
            finally { getEl('loader').classList.add('hidden'); }
        }

        function addNewChapter() {
            const num = chapters.length;
            chapters.push({ label: `Bab ${num}`, title: "", content: "", bridge: "", instruction: "" });
            switchChapter(num);
        }

        function switchChapter(idx) {
            activeIdx = idx;
            const ch = chapters[idx];
            getEl('currentChapterLabel').innerText = ch.label;
            getEl('currentChapterTitle').value = ch.title;
            getEl('chapterInstruction').value = ch.instruction;
            getEl('mainContent').value = ch.content;
            getEl('memoryBridge').innerText = ch.bridge || "Belum ada memori.";
            renderChapterList();
        }

        function updateChapterData() {
            chapters[activeIdx].title = getEl('currentChapterTitle').value;
            chapters[activeIdx].content = getEl('mainContent').value;
            chapters[activeIdx].instruction = getEl('chapterInstruction').value;
            saveAll();
            renderChapterList();
        }

        function renderChapterList() {
            const container = getEl('chapterList');
            container.innerHTML = "";
            chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = `sidebar-item p-4 ${i === activeIdx ? 'active' : 'text-gray-500'}`;
                div.innerHTML = `<div class="text-[10px] font-black uppercase tracking-widest">${ch.label}</div><div class="text-[9px] truncate mt-1 opacity-70">${ch.title || '(Tanpa Judul)'}</div>`;
                div.onclick = () => switchChapter(i);
                container.appendChild(div);
            });
            const sp = document.createElement('div'); sp.style.height = "100px"; container.appendChild(sp);
        }

        function saveAll() {
            const data = { mainTitle: getEl('mainNovelTitle').value, idea: getEl('globalIdea').value, chapters: chapters, key: getEl('apiKey').value };
            localStorage.setItem('tebe_v15_evolution_final_grid', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = localStorage.getItem('tebe_v15_evolution_final_grid');
            if(saved) {
                const d = JSON.parse(saved);
                getEl('mainNovelTitle').value = d.mainTitle || "";
                getEl('globalIdea').value = d.idea || "";
                getEl('apiKey').value = d.key || "";
                chapters = d.chapters;
                switchChapter(activeIdx);
            } else { renderChapterList(); }
        }

        function exportAll(format) {
            const mainTitle = getEl('mainNovelTitle').value || "Novel_Mahakarya";
            let out = "";
            if(format === 'html') {
                out = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
                    body{background:#f4ece0;padding:50px;font-family:serif;line-height:1.8;color:#1a1a1a;} 
                    .container{max-width:800px;margin:auto;background:white;padding:60px;box-shadow:0 0 20px rgba(0,0,0,0.05);border-radius:5px;}
                    h1{text-align:center;font-size:3rem;color:#4a3c28;}
                    h2{text-align:center;color:#8b6b23;margin-top:50px;border-bottom:1px solid #eee;padding-bottom:10px;}
                    p{text-indent:3rem;margin-bottom:1.5rem;text-align:justify;}
                </style></head><body><div class="container"><h1>${mainTitle}</h1>`;
                chapters.forEach(ch => {
                    const cleanP = ch.content.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('');
                    out += `<h2>${ch.label}: ${ch.title}</h2>${cleanP}`;
                });
                out += `</div></body></html>`;
            } else {
                out = `JUDUL NOVEL: ${mainTitle.toUpperCase()}\n\n`;
                chapters.forEach(ch => {
                    out += `\n\n--- ${ch.label.toUpperCase()}: ${ch.title.toUpperCase()} ---\n\n${ch.content}`;
                });
            }
            const blob = new Blob([out], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${mainTitle}.${format}`; a.click();
        }

        function resetApp() { if(confirm("Hapus draf?")) { localStorage.clear(); location.reload(); } }
        async function checkAPI() { 
            const key = getEl('apiKey').value;
            try { 
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                if(res.ok) { getEl('apiStatus').innerText = "ONLINE ✓"; getEl('apiStatus').style.color = "#3b82f6"; }
            } catch(e) { alert("Gagal."); }
        }
    </script>
</body>
</html>
