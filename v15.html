<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v15 EVOLUTION - REBORN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&display=swap');
        
        /* Dasar Layout - Anti Goyang */
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; position: fixed; width: 100%; }
        
        .master-grid { 
            display: grid; 
            grid-template-columns: 260px 1fr; 
            grid-template-rows: 70px 1fr;
            height: 100vh; 
            width: 100vw; 
        }

        /* 1. TOP BAR (JUDUL & API) */
        .top-bar { 
            grid-column: 1 / -1; 
            background: #0a0a0a; 
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 50;
        }

        /* 2. SIDEBAR (NAVIGASI BAB SAJA) */
        .sidebar { 
            background: #080808; 
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chapter-list-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* 3. MAIN EDITOR AREA */
        .editor-container {
            background: #050505;
            overflow-y: auto;
            padding: 30px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* UI ELEMENTS */
        .novel-editor { 
            font-family: 'Crimson Pro', serif; font-size: 1.3rem; line-height: 1.8; background: #0a0a0a; border: 1px solid #1a1a1a; 
            color: #e5e5e5; padding: 30px; border-radius: 20px; width: 100%; outline: none; min-height: 800px; resize: none;
        }

        .sidebar-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; margin-bottom: 5px; border-radius: 10px; padding: 12px; background: rgba(255,255,255,0.02); }
        .sidebar-item.active { background: #111; border-left-color: #3b82f6; color: white; }

        .input-dark { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; padding: 8px 12px; outline: none; font-size: 12px; }
        .btn-action { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; font-weight: 800; padding: 8px 20px; border-radius: 30px; font-size: 11px; text-transform: uppercase; }

        /* Loader */
        .loader { width: 30px; height: 30px; border: 3px solid #111; border-bottom-color: #3b82f6; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="master-grid">
        <header class="top-bar">
            <div class="flex-shrink-0 flex items-center gap-3">
                <h1 class="text-blue-500 font-black italic text-lg uppercase tracking-tighter">v15 REBORN</h1>
                <div class="h-6 w-[1px] bg-gray-800"></div>
            </div>
            
            <div class="flex-1 flex gap-4 items-center">
                <input type="text" id="mainNovelTitle" placeholder="Judul Novel Utama..." class="input-dark w-1/3 font-bold" oninput="saveAll()">
                <input type="password" id="apiKey" placeholder="Gemini API Key..." class="input-dark w-1/3">
                <button onclick="checkAPI()" id="apiStatus" class="text-[9px] font-black text-gray-500 uppercase hover:text-blue-500">Cek Engine</button>
            </div>

            <div class="flex gap-2">
                <button onclick="exportAll('txt')" class="px-4 py-2 bg-gray-800 text-[9px] font-bold rounded-lg uppercase border border-gray-700">Ekspor TXT</button>
                <button onclick="exportAll('html')" class="px-4 py-2 border border-blue-900 text-blue-500 text-[9px] font-bold rounded-lg uppercase">Ekspor HTML</button>
            </div>
        </header>

        <aside class="sidebar">
            <div class="p-4 flex justify-between items-center border-b border-gray-900">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Daftar Bab</span>
                <button onclick="addNewChapter()" class="text-[10px] font-black text-blue-500">+ BARU</button>
            </div>
            <div id="chapterList" class="chapter-list-area">
                </div>
        </aside>

        <main class="editor-container">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="flex items-center justify-between bg-[#0a0a0a] p-4 rounded-2xl border border-gray-900">
                    <div class="flex flex-col">
                        <span id="currentChapterLabel" class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Prolog</span>
                        <input type="text" id="currentChapterTitle" placeholder="Judul Bab..." class="bg-transparent border-none text-white font-bold text-lg outline-none w-full" oninput="updateChapterData()">
                    </div>
                    <button onclick="writeChapter()" class="btn-action shadow-lg shadow-blue-900/20">TULIS NARASI</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <textarea id="globalIdea" rows="2" class="input-dark w-full" placeholder="Konsep Dunia & Sistem..." oninput="saveAll()"></textarea>
                    <textarea id="chapterInstruction" rows="2" class="input-dark w-full" placeholder="Tujuan / Kejadian Bab Ini..." oninput="updateChapterData()"></textarea>
                </div>

                <textarea id="mainContent" class="novel-editor" placeholder="Narasi bab..." oninput="updateChapterData()"></textarea>
                
                <div class="bg-[#0a0a0a] border border-gray-800 p-6 rounded-3xl mb-10">
                    <label class="text-[9px] font-black text-blue-500 uppercase italic mb-2 block tracking-widest">Logika Estafet (Memory)</label>
                    <div id="memoryBridge" class="text-xs text-gray-500 italic leading-relaxed">Belum ada memori untuk bab ini.</div>
                </div>
                
                <div style="height: 100px;"></div>
            </div>
        </main>

        <div id="loader" class="hidden fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center text-center">
            <div class="loader mb-4"></div>
            <p class="text-[10px] font-black tracking-widest text-blue-500 uppercase">Engine Menulis...</p>
        </div>
    </div>

    <script>
        const PROLOG_DEFAULT = "Perkenalkan karakter utama secara mendalam, jelaskan latar belakang dunianya, aturan sistem kekuatan yang ia miliki, dan bagaimana konflik pertama kali muncul.";
        let chapters = [{ label: "Prolog", title: "", content: "", bridge: "", instruction: PROLOG_DEFAULT }];
        let activeIdx = 0;
        const getEl = id => document.getElementById(id);

        async function writeChapter() {
            const key = getEl('apiKey').value;
            if(!key) return alert("API Key Kosong!");
            getEl('loader').classList.remove('hidden');

            let prevContext = "";
            if (activeIdx > 0) {
                const prev = chapters[activeIdx - 1];
                prevContext = `SAMBUNGAN BAB SEBELUMNYA: "...${prev.content.slice(-1500)}"\nMemori Terakhir: ${prev.bridge}\n`;
            }

            const prompt = `PENULIS NOVEL PROFESIONAL. JUDUL: ${getEl('mainNovelTitle').value}\nDUNIA: ${getEl('globalIdea').value}\n${prevContext}INSTRUKSI BAB: ${getEl('chapterInstruction').value}\nATURAN: Tulis narasi langsung (min 1500 kata). GAYA: Sastra Deskriptif. Tanpa Basa-basi.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text.trim();
                getEl('mainContent').value = text;
                chapters[activeIdx].content = text;

                const bRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analisis status tokoh/lokasi bab ini: ${text.substring(0, 2500)}` }] }] })
                });
                const bd = await bRes.json();
                chapters[activeIdx].bridge = bd.candidates[0].content.parts[0].text.trim();
                getEl('memoryBridge').innerText = chapters[activeIdx].bridge;

                saveAll();
                renderChapterList();
            } catch (e) { alert("Error API."); }
            finally { getEl('loader').classList.add('hidden'); }
        }

        function addNewChapter() {
            const num = chapters.length;
            chapters.push({ label: `Bab ${num}`, title: "", content: "", bridge: "", instruction: "" });
            switchChapter(num);
        }

        function switchChapter(idx) {
            activeIdx = idx;
            const ch = chapters[idx];
            getEl('currentChapterLabel').innerText = ch.label;
            getEl('currentChapterTitle').value = ch.title;
            getEl('chapterInstruction').value = ch.instruction;
            getEl('mainContent').value = ch.content;
            getEl('memoryBridge').innerText = ch.bridge || "Belum ada memori.";
            renderChapterList();
        }

        function updateChapterData() {
            chapters[activeIdx].title = getEl('currentChapterTitle').value;
            chapters[activeIdx].content = getEl('mainContent').value;
            chapters[activeIdx].instruction = getEl('chapterInstruction').value;
            saveAll();
            renderChapterList();
        }

        function renderChapterList() {
            const container = getEl('chapterList');
            container.innerHTML = "";
            chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = `sidebar-item ${i === activeIdx ? 'active' : 'text-gray-500'}`;
                div.innerHTML = `<div class="text-[9px] font-black uppercase tracking-widest">${ch.label}</div><div class="text-[10px] truncate mt-1 opacity-70 font-bold">${ch.title || '(Tanpa Judul)'}</div>`;
                div.onclick = () => switchChapter(i);
                container.appendChild(div);
            });
        }

        function saveAll() {
            const data = { mainTitle: getEl('mainNovelTitle').value, idea: getEl('globalIdea').value, chapters: chapters, key: getEl('apiKey').value };
            localStorage.setItem('tebe_v15_reborn', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = localStorage.getItem('tebe_v15_reborn');
            if(saved) {
                const d = JSON.parse(saved);
                getEl('mainNovelTitle').value = d.mainTitle || "";
                getEl('globalIdea').value = d.idea || "";
                getEl('apiKey').value = d.key || "";
                chapters = d.chapters;
                switchChapter(activeIdx);
            } else { renderChapterList(); }
        }

        function exportAll(format) {
            const mainTitle = getEl('mainNovelTitle').value || "Novel_Mahakarya";
            let out = "";
            if(format === 'html') {
                out = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
                    body{background:#f4ece0;padding:50px;font-family:serif;line-height:1.8;color:#1a1a1a;} 
                    .container{max-width:800px;margin:auto;background:white;padding:50px;box-shadow:0 0 10px rgba(0,0,0,0.05);border-radius:5px;}
                    h1{text-align:center;font-size:2.5rem;color:#4a3c28;}
                    h2{text-align:center;color:#8b6b23;margin-top:40px;border-bottom:1px solid #eee;}
                    p{text-indent:2rem;margin-bottom:1rem;text-align:justify;}
                </style></head><body><div class="container"><h1>${mainTitle}</h1>`;
                chapters.forEach(ch => {
                    const cleanP = ch.content.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('');
                    out += `<h2>${ch.label}: ${ch.title}</h2>${cleanP}`;
                });
                out += `</div></body></html>`;
            } else {
                out = `JUDUL: ${mainTitle.toUpperCase()}\n\n`;
                chapters.forEach(ch => { out += `\n\n--- ${ch.label}: ${ch.title} ---\n\n${ch.content}`; });
            }
            const blob = new Blob([out], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${mainTitle}.${format}`; a.click();
        }

        function resetApp() { if(confirm("Hapus draf?")) { localStorage.clear(); location.reload(); } }
        async function checkAPI() { 
            const key = getEl('apiKey').value;
            try { 
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                if(res.ok) { getEl('apiStatus').innerText = "ONLINE ✓"; getEl('apiStatus').style.color = "#3b82f6"; }
            } catch(e) { alert("Gagal."); }
        }
    </script>
</body>
</html>
