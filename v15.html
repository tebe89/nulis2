<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v16 STREAM - Infinite Flow (Bang Tebe)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&display=swap');
        
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; width: 100%; position: fixed; }
        
        .master-layout { 
            display: grid; 
            grid-template-columns: 260px 1fr; 
            grid-template-rows: auto 1fr;
            height: 100vh; 
            transition: 0.3s ease;
        }

        .sidebar-hidden { grid-template-columns: 0px 1fr; }

        /* HEADER & NAV */
        .top-nav { grid-column: 1 / -1; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 10px; gap: 8px; z-index: 100; }
        .nav-row-1 { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .nav-row-2 { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding-bottom: 2px; }

        /* SIDEBAR */
        .sidebar { background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }
        .chapter-nav { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }

        /* CONTENT AREA */
        .main-stream { overflow-y: auto; background: #050505; transition: background 0.3s; scroll-behavior: smooth; }
        .stream-container { max-width: 900px; margin: 0 auto; padding: 20px; padding-bottom: 150px; }

        /* CHAPTER CARD */
        .chapter-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 18px; margin-bottom: 25px; overflow: hidden; transition: 0.3s; }
        .card-header { padding: 15px 20px; background: #0f0f0f; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .card-body { padding: 20px; }
        .collapsed .card-body { display: none; }

        /* TEXT AREAS */
        .novel-editor { 
            font-family: 'Crimson Pro', serif; font-size: 1.3rem; line-height: 1.8; 
            background: #050505; color: #e5e5e5; padding: 25px; 
            border-radius: 12px; border: 1px solid #1a1a1a; width: 100%; 
            outline: none; min-height: 400px; resize: none;
        }

        /* READER MODE */
        .reader-mode .main-stream { background: #d1c7ac; }
        .reader-mode .chapter-card { background: transparent; border: none; box-shadow: none; margin-bottom: 50px; }
        .reader-mode .card-header, .reader-mode .edit-tools { display: none; }
        .reader-mode .novel-editor { 
            background: transparent; color: #2c241a; border: none; font-size: 1.45rem; 
            min-height: auto; text-align: justify; padding: 0; pointer-events: none;
        }
        .reader-mode .stream-container { max-width: 850px; padding: 60px 20px; }

        /* UI BUTTONS */
        .btn-ui { padding: 6px 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 6px; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-outline { border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-dark { background: #111; border: 1px solid #333; color: #999; }

        .input-dark { background: #111; border: 1px solid #222; color: white; border-radius: 6px; padding: 6px 10px; outline: none; font-size: 10px; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #10b981; color: white; padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 9px; transition: 0.5s; z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body class="edit-mode">

    <div id="master" class="master-layout">
        <header class="top-nav">
            <div class="nav-row-1">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="btn-ui btn-dark" style="font-size: 16px;">☰</button>
                    <h1 class="text-blue-500 font-black italic uppercase text-xs">v16 STREAM</h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="setView('read')" id="btnRead" class="btn-ui btn-dark">BACA</button>
                    <button onclick="setView('edit')" id="btnEdit" class="btn-ui btn-outline">EDIT</button>
                    <button onclick="exportAll('html')" class="btn-ui btn-blue">EKSPOR</button>
                </div>
            </div>
            
            <div id="configRow" class="nav-row-2">
                <input type="text" id="mainNovelTitle" placeholder="Judul Novel..." class="input-dark w-32 font-bold" oninput="saveAll()">
                <input type="password" id="apiKey" placeholder="Ganti API Key..." class="input-dark w-32">
                <button onclick="fetchModels()" id="btnFetch" class="btn-ui btn-dark border border-gray-700">Hubungkan</button>
                <select id="modelSelect" class="input-dark hidden border-blue-900 text-blue-400 font-bold" onchange="saveAll()"></select>
            </div>
        </header>

        <aside class="sidebar">
            <div class="p-3 border-b border-gray-900 text-[9px] font-black text-gray-600 uppercase">Lompat Ke Bab</div>
            <div id="chapterNav" class="chapter-nav"></div>
            <div class="p-3 border-t border-gray-900">
                <div class="text-[8px] font-black text-gray-500 uppercase mb-2">Memory Global</div>
                <textarea id="globalIdea" class="input-dark w-full text-[9px]" rows="4" placeholder="Fakta penting cerita..." oninput="saveAll()"></textarea>
                <button onclick="resetApp()" class="w-full mt-4 py-1 text-[8px] text-red-900 font-black uppercase opacity-30">Hapus Semua</button>
            </div>
        </aside>

        <main id="mainView" class="main-stream">
            <div id="streamContainer" class="stream-container">
                </div>
            
            <div id="floatingAction" class="fixed bottom-6 left-0 right-0 flex justify-center gap-4 pointer-events-none">
                <button onclick="prepareNextChapter()" class="pointer-events-auto px-10 py-3 bg-blue-600 text-white font-black rounded-full text-[10px] uppercase shadow-2xl">Lanjut Bab Berikutnya ↓</button>
            </div>
        </main>
    </div>

    <div id="toast">BAB SELESAI, BANG TEBE! ✓</div>

    <script>
        let chapters = [{ id: Date.now(), label: "Prolog", title: "Awal Segalanya", content: "", instruction: "Perkenalkan dunia dan tokoh utama secara mendalam.", collapsed: false }];
        let isWriting = false;
        let currentMode = 'edit';
        const getEl = id => document.getElementById(id);

        function toggleSidebar() { getEl('master').classList.toggle('sidebar-hidden'); }

        async function fetchModels() {
            const key = getEl('apiKey').value;
            if(!key) return alert("Input API Key dulu, Bang!");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if(data.models) {
                    const sel = getEl('modelSelect');
                    sel.innerHTML = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'))
                                        .map(m => `<option value="${m.name}">${m.displayName.replace("Gemini ","")}</option>`).join('');
                    sel.classList.remove('hidden');
                    getEl('btnFetch').classList.add('hidden');
                    saveAll();
                }
            } catch (e) { alert("Key Gagal."); }
        }

        function setView(mode) {
            currentMode = mode;
            document.body.className = mode + '-mode';
            if(mode === 'read') {
                getEl('configRow').classList.add('hidden');
                getEl('floatingAction').classList.add('hidden');
            } else {
                getEl('configRow').classList.remove('hidden');
                getEl('floatingAction').classList.remove('hidden');
            }
            getEl('btnRead').className = mode === 'read' ? 'btn-ui btn-blue' : 'btn-ui btn-dark';
            getEl('btnEdit').className = mode === 'edit' ? 'btn-ui btn-outline' : 'btn-ui btn-dark';
            renderStream();
        }

        function renderStream() {
            const container = getEl('streamContainer');
            container.innerHTML = "";
            
            chapters.forEach((ch, idx) => {
                const card = document.createElement('div');
                card.id = `card-${ch.id}`;
                card.className = `chapter-card ${ch.collapsed ? 'collapsed' : ''}`;
                
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCollapse(${idx})">
                        <span class="text-[10px] font-black text-blue-500 uppercase italic">${ch.label}: ${ch.title || 'Tanpa Judul'}</span>
                        <span class="text-[9px] text-gray-600">${ch.collapsed ? 'BUKA' : 'LIPAT'}</span>
                    </div>
                    <div class="card-body">
                        <div class="edit-tools mb-4 space-y-3">
                            <input type="text" value="${ch.title}" placeholder="Judul Bab..." 
                                class="bg-transparent border-b border-gray-800 text-white font-black text-xl outline-none w-full mb-2"
                                oninput="updateChapter(${idx}, 'title', this.value)">
                            <div class="grid grid-cols-1 gap-2">
                                <label class="text-[8px] font-black text-blue-500 uppercase">Instruksi Alur Bab Ini</label>
                                <textarea class="input-dark w-full" oninput="updateChapter(${idx}, 'instruction', this.value)">${ch.instruction}</textarea>
                            </div>
                            <div class="flex justify-end gap-2 mt-2">
                                <button onclick="runWriting(${idx})" class="px-6 py-2 bg-blue-600 text-white text-[9px] font-black rounded-full">BUAT NARASI</button>
                                <button onclick="rebuildChapter(${idx})" class="px-4 py-2 border border-gray-800 text-[8px] text-gray-500 rounded-full">REVISI</button>
                            </div>
                        </div>
                        <textarea class="novel-editor" placeholder="Narasi..." oninput="updateChapter(${idx}, 'content', this.value)">${ch.content}</textarea>
                    </div>
                `;
                container.appendChild(card);
            });
            renderNav();
        }

        function toggleCollapse(idx) {
            chapters[idx].collapsed = !chapters[idx].collapsed;
            renderStream();
            saveAll();
        }

        function updateChapter(idx, field, value) {
            chapters[idx][field] = value;
            saveAll();
            if(field === 'title') renderNav();
        }

        async function runWriting(idx) {
            if(isWriting) return;
            const key = getEl('apiKey').value;
            const model = getEl('modelSelect').value;
            const idea = getEl('globalIdea').value;
            if(!key || !model) return alert("Bang Tebe, Hubungkan API dulu!");

            isWriting = true;
            getEl('toast').innerText = "AI SEDANG MENULIS...";
            getEl('toast').classList.add('show');

            let prevText = idx > 0 ? `KONTEKS SEBELUMNYA: "...${chapters[idx-1].content.slice(-2000)}"\n` : "";
            const prompt = `PENULIS NOVEL. MEMORY: ${idea}\n${prevText}BAB INI (${chapters[idx].label}): ${chapters[idx].instruction}\nATURAN: Tulis narasi min 1500 kata.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                chapters[idx].content = d.candidates[0].content.parts[0].text.trim();
                renderStream();
                showToast("BAB SELESAI, BANG TEBE! ✓");
            } catch (e) { alert("API Error."); }
            finally { isWriting = false; }
        }

        async function prepareNextChapter() {
            const key = getEl('apiKey').value;
            const lastIdx = chapters.length - 1;
            if(!chapters[lastIdx].content) return alert("Selesaikan bab terakhir dulu!");
            
            // Lipat semua bab sebelumnya
            chapters.forEach(c => c.collapsed = true);

            const prompt = `Analisis bab ini: "${chapters[lastIdx].content.slice(-1000)}". Berikan instruksi alur singkat bab selanjutnya.`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${getEl('apiKey').value}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const nextNum = chapters.length;
                chapters.push({ 
                    id: Date.now(), 
                    label: `Bab ${nextNum}`, 
                    title: `Bab ${nextNum}`, 
                    content: "", 
                    instruction: d.candidates[0].content.parts[0].text.trim(), 
                    collapsed: false 
                });
                renderStream();
                window.scrollTo(0, document.body.scrollHeight);
            } catch(e) { alert("Gagal merancang bab baru."); }
        }

        function renderNav() {
            const nav = getEl('chapterNav'); nav.innerHTML = "";
            chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = "sidebar-item";
                div.innerHTML = `<b>${ch.label}</b><br><span class="opacity-50 truncate block">${ch.title}</span>`;
                div.onclick = () => {
                    getEl(`card-${ch.id}`).scrollIntoView({ behavior: 'smooth' });
                    if(ch.collapsed) toggleCollapse(i);
                };
                nav.appendChild(div);
            });
        }

        function showToast(msg) {
            getEl('toast').innerText = msg;
            getEl('toast').classList.add('show');
            setTimeout(() => getEl('toast').classList.remove('show'), 3000);
        }

        function saveAll() {
            const data = { novelTitle: getEl('mainNovelTitle').value, idea: getEl('globalIdea').value, chapters, key: getEl('apiKey').value, model: getEl('modelSelect').value };
            localStorage.setItem('v16_tebe_stream', JSON.stringify(data));
        }

        window.onload = () => {
            const saved = localStorage.getItem('v16_tebe_stream');
            if(saved) {
                const d = JSON.parse(saved);
                getEl('mainNovelTitle').value = d.novelTitle || "";
                getEl('globalIdea').value = d.idea || "";
                getEl('apiKey').value = d.key || "";
                chapters = d.chapters;
                if(d.key) fetchModels().then(() => getEl('modelSelect').value = d.model);
            }
            renderStream();
        }

        function exportAll() {
            const mainTitle = getEl('mainNovelTitle').value || "Novel";
            let out = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{background:#d1c7ac;padding:50px;font-family:serif;line-height:1.8;color:#2c241a;}.container{max-width:850px;margin:auto;padding:60px;}h1,h2{text-align:center;}p{text-indent:2.5rem;margin-bottom:1.5rem;text-align:justify;}</style></head><body><div class="container"><h1>${mainTitle}</h1>`;
            chapters.forEach(ch => { out += `<h2>${ch.label}: ${ch.title}</h2>${ch.content.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('')}<hr>`; });
            out += `</div></body></html>`;
            const blob = new Blob([out], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${mainTitle}.html`; a.click();
        }

        function resetApp() { if(confirm("Hapus semua cerita, Bang Tebe?")) { localStorage.clear(); location.reload(); } }
        function rebuildChapter(idx) { if(confirm("Revisi bab ini?")) runWriting(idx); }
    </script>
</body>
</html>
