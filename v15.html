<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL RECOVERY - Bang Tebe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .recovery-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        textarea { width: 100%; background: #111; color: #eee; border: 1px solid #222; border-radius: 8px; padding: 15px; font-family: serif; font-size: 1.2rem; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-blue-500 font-black text-2xl mb-2">PROJEK RECOVERY</h1>
        <p class="text-gray-500 text-sm mb-8">Gunakan halaman ini untuk mengambil/menyelamatkan naskah yang tersisa di memori browser.</p>
        
        <div id="status">Memeriksa data...</div>
        <div id="output"></div>

        <button onclick="exportData()" class="mt-8 px-8 py-3 bg-blue-600 text-white font-black rounded-full uppercase text-xs">Ekspor Semua ke HTML</button>
    </div>

    <script>
        const storageKeys = ['v15_tebe_linear_final_v2', 'v16_tebe_stream', 'v16_tebe_luxury_v1', 'v16_tebe_infinite_v2', 'v16_5_tebe_final'];
        let allChapters = [];

        window.onload = () => {
            const out = document.getElementById('output');
            storageKeys.forEach(key => {
                const data = localStorage.getItem(key);
                if(data) {
                    const parsed = JSON.parse(data);
                    parsed.chapters.forEach(ch => {
                        const div = document.createElement('div');
                        div.className = 'recovery-card';
                        div.innerHTML = `<h2 class="text-blue-400 font-bold mb-2">${ch.label}: ${ch.title}</h2><textarea rows="8">${ch.content}</textarea>`;
                        out.appendChild(div);
                        allChapters.push(ch);
                    });
                }
            });
            document.getElementById('status').innerText = allChapters.length > 0 ? `Ditemukan ${allChapters.length} bab.` : "Tidak ada data ditemukan.";
        };

        function exportData() {
            let html = `<html><body style="background:#d9cfb8; font-family:serif; padding:50px; line-height:1.8;">`;
            allChapters.forEach(ch => {
                html += `<h1>${ch.label}: ${ch.title}</h1><p>${ch.content.replace(/\n/g, '<br>')}</p><hr>`;
            });
            html += `</body></html>`;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Novel_Bang_Tebe_Recovery.html";
            a.click();
        }
    </script>
</body>
</html>
