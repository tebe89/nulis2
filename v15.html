<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v15 MASTER ARCHITECT - Full Blueprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap');
        body { background-color: #080808; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .input-dark { background: #111; border: 1px solid #222; color: #fff; border-radius: 12px; outline: none; }
        .input-dark:focus { border-color: #3b82f6; }
        .prompt-box { font-family: 'Fira Code', monospace; background: #000; color: #10b981; border: 1px solid #1a1a1a; font-size: 0.8rem; border-radius: 12px; white-space: pre-wrap; }
        .master-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 24px; }
        .blue-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div id="loader" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/95">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black tracking-widest text-blue-500 uppercase">Merancang Seluruh Alur Cerita...</p>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-white mb-2">v15 MASTER <span class="text-blue-600">ARCHITECT</span></h1>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em]">One-Click Full Novel Blueprint</p>
        </header>

        <div class="master-card p-6 mb-10 blue-glow">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <input type="password" id="apiKey" placeholder="Gemini API Key..." class="w-full p-3 input-dark text-xs">
                    <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-3 input-dark text-sm font-bold">
                    <div class="flex items-center justify-between p-3 bg-black rounded-xl border border-gray-900">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">Jumlah Bab</span>
                        <input type="number" id="chCount" value="10" class="w-12 bg-transparent text-center text-blue-500 font-black text-xl">
                    </div>
                </div>
                <div class="space-y-4">
                    <textarea id="novelIdea" rows="5" placeholder="Jelaskan garis besar cerita, dunia, dan konflik utamanya..." class="w-full p-3 input-dark text-xs"></textarea>
                    <button onclick="generateFullBlueprint()" class="w-full py-4 btn-primary text-white font-black text-xs rounded-xl uppercase tracking-widest">Rancang Seluruh Alur Sekarang</button>
                </div>
            </div>
        </div>

        <div id="resultArea" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black text-white italic">HASIL RANCANGAN PROMPT BERANTAI</h2>
                <button onclick="downloadFullFile()" class="px-6 py-2 bg-emerald-600 text-white text-[10px] font-black rounded-full uppercase hover:bg-emerald-500 transition">Download Master File (.txt)</button>
            </div>
            
            <div id="blueprintContainer" class="space-y-8 pb-20">
                </div>
        </div>
    </div>

    <script>
        const getEl = id => document.getElementById(id);
        let currentFullData = "";

        async function generateFullBlueprint() {
            const key = getEl('apiKey').value.trim();
            const title = getEl('novelTitle').value || "Novel Tanpa Judul";
            const idea = getEl('novelIdea').value;
            const count = getEl('chCount').value;

            if(!key || !idea) return alert("API Key dan Ide Cerita harus diisi!");

            getEl('loader').classList.remove('hidden');

            const masterPrompt = `Anda adalah Arsitek Novel Senior. Tugas Anda adalah merancang alur lengkap dari awal sampai akhir agar cerita nyambung secara keseluruhan dan tidak tumpang tindih.

            JUDUL: ${title}
            IDE UTAMA: ${idea}
            TOTAL: ${count} Bab.

            OUTPUT WAJIB: Hasilkan dalam format JSON murni seperti ini:
            [{"bab": 1, "judul": "...", "alur_singkat": "..."}, {"bab": 2, "judul": "...", "alur_singkat": "..."}]

            PENTING: Pastikan plot tiap bab adalah kelanjutan logis dari bab sebelumnya. Hanya balas dengan kode JSON.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: masterPrompt }] }] })
                });
                
                const data = await res.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const jsonStr = rawText.substring(rawText.indexOf('['), rawText.lastIndexOf(']') + 1);
                const chapters = JSON.parse(jsonStr);
                
                renderBlueprint(chapters, title, idea);
            } catch (e) {
                alert("Gagal merancang. Pastikan API Key benar.");
                console.error(e);
            } finally {
                getEl('loader').classList.add('hidden');
            }
        }

        function renderBlueprint(chapters, title, idea) {
            getEl('resultArea').classList.remove('hidden');
            const container = getEl('blueprintContainer');
            container.innerHTML = "";
            currentFullData = `MASTER BLUEPRINT: ${title}\nKONSEP: ${idea}\n\n`;

            chapters.forEach((ch) => {
                const promptWrapped = `[PERINTAH PENULISAN CLEAN - BAB ${ch.bab}]
Judul Bab: ${ch.judul}
Alur Singkat Bab Ini: ${ch.alur_singkat}

KONTEKS DUNIA: ${idea}

INSTRUKSI:
1. Tuliskan LANGSUNG narasi ceritanya tanpa salam pembuka atau penjelasan apapun.
2. Cerita harus "CLEAN", langsung masuk ke paragraf narasi.
3. Pastikan alur nyambung dengan kejadian sebelumnya secara linear.
4. Gunakan gaya bahasa sastra yang mendalam. Target 1500-2000 kata.

(Mulai menulis narasi sekarang)`;

                currentFullData += `--- PROMPT BAB ${ch.bab} ---\n${promptWrapped}\n\n`;

                const section = document.createElement('div');
                section.className = "master-card p-6 border-l-4 border-l-blue-600";
                section.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Bab ${ch.bab}</span>
                            <h3 class="text-white font-bold text-lg">${ch.judul}</h3>
                        </div>
                        <button onclick="copyText(\`prompt-${ch.bab}\`)" class="text-[9px] bg-gray-800 px-3 py-1 rounded text-gray-400 hover:text-white uppercase font-bold">Copy Prompt</button>
                    </div>
                    <p class="text-xs text-gray-500 italic mb-4">${ch.alur_singkat}</p>
                    <div id="prompt-${ch.bab}" class="prompt-box p-4 text-[11px] leading-relaxed">${promptWrapped}</div>
                `;
                container.appendChild(section);
            });
        }

        function copyText(id) {
            const text = getEl(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Prompt Bab Berhasil Disalin!");
        }

        function downloadFullFile() {
            const blob = new Blob([currentFullData], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${getEl('novelTitle').value || 'Blueprint'}_Master_Prompt.txt`;
            a.click();
        }
    </script>
</body>
</html>
