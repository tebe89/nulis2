<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEBE v15 - Dual Engine Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="aiPopup" class="hidden fixed inset-0 z-[999] flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-[#1a1a1a] border border-gray-800 p-6 rounded-2xl text-center shadow-2xl max-w-[280px] w-full">
            <div class="loader mb-3 mx-auto"></div>
            <h3 class="text-white font-bold text-sm" id="popupStatus">Memproses...</h3>
            <div id="popupTimer" class="text-yellow-500 text-lg font-black my-1">0s</div>
            <div id="engineStatus" class="text-[10px] font-bold italic tracking-widest">DUAL ENGINE ACTIVE</div>
            <button onclick="window.cancelProcess()" class="mt-4 text-[10px] text-red-500 border border-red-900/50 px-4 py-1 rounded-full">CANCEL</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="space-y-6">
            <h1 class="text-xl font-bold gold-text border-b border-gray-800 pb-2 text-center">v15 Dual Engine</h1>
            
            <div class="space-y-3 bg-black/20 p-3 rounded-xl border border-gray-800">
                <span class="text-[9px] font-black text-gray-500 uppercase flex justify-between">🚀 ENGINE 1 (THE WRITER)</span>
                <input type="password" id="apiKey1" placeholder="API Key Utama..." class="w-full p-2 input-dark text-[10px]" oninput="window.saveDraft()">
                
                <span class="text-[9px] font-black text-gray-500 uppercase flex justify-between pt-2">🧠 ENGINE 2 (THE ARCHITECT)</span>
                <input type="password" id="apiKey2" placeholder="API Key Memori..." class="w-full p-2 input-dark text-[10px]" oninput="window.saveDraft()">
                
                <button type="button" onclick="window.checkEngines()" class="w-full py-2 gold-bg text-[10px] font-bold rounded shadow-lg">HUBUNGKAN DUAL ENGINE</button>
                
                <div id="engineWrapper" class="hidden space-y-2">
                    <select id="modelSelect1" class="w-full p-2 input-dark text-yellow-500 text-[10px]" onchange="window.saveDraft()"></select>
                    <select id="modelSelect2" class="w-full p-2 input-dark text-blue-400 text-[10px]" onchange="window.saveDraft()"></select>
                </div>
            </div>

            <div class="space-y-2">
                <span class="text-[10px] font-black text-gray-500 uppercase">1. Konsep Dunia</span>
                <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-2 input-dark" oninput="window.saveDraft()">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="genre" placeholder="Genre" class="p-2 input-dark" oninput="window.saveDraft()">
                    <input type="text" id="style" placeholder="Gaya Bahasa" class="p-2 input-dark" oninput="window.saveDraft()">
                </div>
                <textarea id="storyIdea" rows="3" placeholder="World Building & Aturan Dunia..." class="w-full p-2 input-dark text-[11px]" oninput="window.saveDraft()"></textarea>
            </div>

            <div class="space-y-2">
                <span class="text-[10px] font-black text-gray-500 uppercase">2. Struktur</span>
                <input type="number" id="chapterCount" value="3" class="w-full p-2 input-dark text-center gold-text font-bold">
                <button type="button" onclick="window.planNovel()" class="w-full py-3 bg-blue-900 text-white text-[10px] font-bold rounded-lg border border-blue-500">RANCANG ALUR</button>
            </div>

            <div class="pt-4 border-t border-gray-800 grid grid-cols-2 gap-2">
                <button onclick="window.downloadFull('txt')" class="py-2 bg-gray-800 text-[10px] font-bold rounded">FULL TXT</button>
                <button onclick="window.downloadFull('html')" class="py-2 border border-[#c5a059] gold-text text-[10px] font-bold rounded">FULL HTML</button>
            </div>
            <button onclick="window.clearAllData()" class="w-full py-1 text-[8px] text-red-900 uppercase font-bold mt-2">Hapus Draf</button>
        </div>
    </div>

    <div class="main-content p-6 md:p-10">
        <div id="mainPlaceholder" class="h-full flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold gold-text mb-4 novel-font">Dual Engine v15</h2>
            <p class="text-gray-400 text-sm italic">"API 1 Menulis, API 2 Mengingat. Kualitas Tanpa Limit."</p>
        </div>
        <div id="novelWorkspace" class="hidden space-y-10 max-w-4xl mx-auto pb-20">
            <div class="text-center border-b border-gray-800 pb-8">
                <h2 id="displayTitle" class="text-5xl font-bold gold-text novel-font"></h2>
            </div>
            <div id="chaptersArea" class="space-y-12"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
